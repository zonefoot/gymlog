<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GymLog" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>GymLog</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         rgba(10,0,0,0.0);
      --bg-card:    rgba(12,4,4,0.72);
      --bg-input:   rgba(20,6,6,0.80);
      --bg-badge:   rgba(30,10,10,0.85);
      --accent:     #e8ff57;
      --accent-dk:  #b8cc30;
      --text:       #f0f0f0;
      --muted:      #9a8a8a;
      --border:     rgba(255,255,255,0.08);
      --danger:     #ff4d4d;
      --success:    #4dff91;
      --r:          16px;
      --rsm:        10px;
      --safe-top:   env(safe-area-inset-top,  0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
      --ua: #57c4ff; --ub: #c084fc; --la: #ff8c57; --lb: #4dff91;
      /* Glassmorphism blur pour les surfaces */
      --glass-blur: blur(18px);
      --glass-border: 1px solid rgba(255,255,255,0.07);
    }
    html,body { height:100%; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
      font-size:16px; -webkit-font-smoothing:antialiased; overscroll-behavior:none;
      background: #1a0000; /* fallback */
    }

    /* ---- BACKGROUND FIXE PLEIN ÉCRAN ---- */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url(Gemini_Generated_Image_m5eawjm5eawjm5ea.png);
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      /* Assombrir pour que le contenu reste lisible */
      filter: brightness(0.75) saturate(1);
    }

    /* Overlay gradient du bas pour renforcer la lisibilité */
    #bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(10,0,0,0.3) 40%,
        rgba(10,0,0,0.7) 100%
      );
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }
    #content { flex:1; overflow-y:auto; padding:0 16px 24px; -webkit-overflow-scrolling:touch; }

    /* HEADER */
    #app-header {
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom: var(--glass-border); flex-shrink:0;
      background: rgba(8,2,2,0.65);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    .header-title { font-size:22px; font-weight:700; letter-spacing:-.5px; }
    .header-title span { color:var(--accent); }
    .header-date { font-size:12px; color:var(--muted); }

    /* BOUTON RETOUR SÉANCE */
    #btn-back-session {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    #btn-back-session:active { color: var(--danger); }

    /* TYPE BAR */
    #type-bar {
      display:flex; gap:8px; padding:12px 16px;
      border-bottom: var(--glass-border); flex-shrink:0;
      overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
      background: rgba(8,2,2,0.5);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    #type-bar::-webkit-scrollbar { display:none; }
    .type-btn {
      flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:2px;
      padding:9px 16px; background: rgba(255,255,255,0.04); border: var(--glass-border);
      border-radius:12px; color:var(--muted); font-size:14px; font-weight:700;
      cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all .18s;
      font-family:inherit;
    }
    .type-btn .sub { font-size:9px; font-weight:500; letter-spacing:.5px; opacity:.6; text-transform:uppercase; }
    .type-btn[data-t="Upper A"].on { background:rgba(87,196,255,.15); border-color:var(--ua); color:var(--ua); }
    .type-btn[data-t="Upper B"].on { background:rgba(192,132,252,.15); border-color:var(--ub); color:var(--ub); }
    .type-btn[data-t="Lower A"].on { background:rgba(255,140,87,.15);  border-color:var(--la); color:var(--la); }
    .type-btn[data-t="Lower B"].on { background:rgba(77,255,145,.15);  border-color:var(--lb); color:var(--lb); }

    /* NAV */
    #bottom-nav {
      display:flex;
      background: rgba(8,2,2,0.80);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-top: var(--glass-border);
      padding-bottom:var(--safe-bot); flex-shrink:0;
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      padding:10px 0; background:none; border:none; color:var(--muted);
      font-size:10px; font-weight:500; cursor:pointer; transition:color .2s;
      -webkit-tap-highlight-color:transparent;
    }
    .nav-btn svg { width:22px; height:22px; stroke-width:1.8; }
    .nav-btn.on { color:var(--accent); }

    /* ÉCRANS */
    .screen { display:none; padding-top:20px; }
    .screen.on { display:block; }

    /* TYPO */
    .sec { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase;
           letter-spacing:.8px; margin:20px 0 10px; }
    .sec:first-child { margin-top:0; }

    /* ======================================================
       ÉCRAN SÉANCE — FLOW UN EXOS À LA FOIS
    ====================================================== */

    /* Bandeau de progression */
    #session-progress-bar {
      display:none; flex-direction:column; gap:6px;
      background: rgba(8,2,2,0.65);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: var(--glass-border);
      padding:10px 16px; flex-shrink:0;
    }
    .prog-top { display:flex; justify-content:space-between; align-items:center; }
    .prog-type { font-size:12px; font-weight:700; }
    .prog-label { font-size:12px; color:var(--muted); }
    .prog-track { height:4px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
    .prog-fill  { height:100%; background:var(--accent); border-radius:2px; transition:width .4s ease; }

    /* Carte exercice courant */
    #exo-card {
      background: rgba(10,3,3,0.70);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius:var(--r); padding:18px 16px; margin-bottom:14px;
    }
    .exo-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
    .exo-name { font-size:20px; font-weight:700; letter-spacing:-.3px; }
    .exo-target-sets { font-size:12px; color:var(--muted); margin-bottom:14px; }

    /* Dernière perf */
    #last-perf {
      background: rgba(255,255,255,0.04); border-radius:var(--rsm);
      border: var(--glass-border);
      padding:10px 12px; margin-bottom:14px; font-size:12px; color:var(--muted);
    }
    #last-perf strong { color:var(--text); }

    /* Saisie série */
    .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
    input[type="number"] {
      background: rgba(255,255,255,0.06); border: var(--glass-border); border-radius:var(--rsm);
      color:var(--text); font-size:20px; font-weight:600; padding:12px 14px;
      appearance:none; -webkit-appearance:none; outline:none; font-family:inherit;
      transition:border-color .2s; text-align:center; width:100%;
    }
    input:focus { border-color:var(--accent); }

    /* 1RM inline */
    #orm-inline {
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(135deg,rgba(26,31,0,0.8),rgba(37,45,0,0.8));
      border:1px solid rgba(232,255,87,0.4);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border-radius:var(--rsm); padding:10px 14px; margin-bottom:14px;
    }
    .orm-lbl { font-size:11px; font-weight:600; color:var(--accent-dk); text-transform:uppercase; letter-spacing:.6px; }
    .orm-val { font-size:24px; font-weight:700; color:var(--accent); }

    /* Séries enregistrées pour l'exo courant */
    #done-sets { margin-bottom:14px; }
    .set-chip {
      display:inline-flex; align-items:center; gap:6px;
      background: rgba(255,255,255,0.06); border-radius:8px; padding:5px 10px;
      font-size:12px; margin:0 4px 4px 0; border: var(--glass-border);
    }
    .set-chip .orm-chip { color:var(--accent-dk); font-size:10px; }
    .set-chip .del-chip { color:var(--muted); cursor:pointer; font-size:13px;
      -webkit-tap-highlight-color:transparent; }
    .set-chip .del-chip:active { color:var(--danger); }

    /* Boutons action */
    .btn {
      width:100%; border:none; border-radius:var(--r); font-size:15px; font-weight:700;
      padding:15px; cursor:pointer; font-family:inherit;
      -webkit-tap-highlight-color:transparent; transition:opacity .15s,transform .1s;
    }
    .btn:active { opacity:.85; transform:scale(.98); }
    .btn-accent  { background:var(--accent); color:#0a0a0a; }
    .btn-outline { background: rgba(232,255,87,0.08); color:var(--accent); border:1px solid rgba(232,255,87,0.4);
                   margin-top:8px; }
    .btn-ghost   { background: rgba(255,255,255,0.04); color:var(--muted); border: var(--glass-border);
                   margin-top:8px; font-size:13px; }
    .btn-danger  { background: rgba(255,77,77,0.08); color:var(--danger); border:1px solid rgba(255,77,77,0.3);
                   margin-top:8px; font-size:13px; }

    /* Écran fin de séance */
    #screen-done { text-align:center; padding:40px 20px; }
    .done-icon { font-size:56px; margin-bottom:16px; }
    .done-title { font-size:24px; font-weight:700; margin-bottom:6px; }
    .done-sub { font-size:14px; color:var(--muted); margin-bottom:28px; }
    .done-recap { text-align:left; }

    /* Résumé fin séance */
    .recap-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 0; border-bottom: var(--glass-border);
    }
    .recap-row:last-child { border-bottom:none; }
    .recap-exo { font-size:14px; font-weight:600; }
    .recap-detail { font-size:12px; color:var(--muted); }
    .recap-orm { font-size:12px; color:var(--accent); font-weight:600; }

    /* ======================================================
       ÉCRAN PROGRESSION
    ====================================================== */
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
    .stat-box {
      background: rgba(10,3,3,0.65);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border); border-radius:var(--rsm); padding:12px; text-align:center;
    }
    .stat-val { font-size:22px; font-weight:700; }
    .stat-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }

    .filter-row {
      display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch;
      margin-bottom:16px; scrollbar-width:none; padding-bottom:2px;
    }
    .filter-row::-webkit-scrollbar { display:none; }
    .fpill {
      flex-shrink:0; background: rgba(255,255,255,0.04); border: var(--glass-border);
      border-radius:20px; color:var(--muted); font-size:13px; font-weight:600;
      padding:7px 14px; cursor:pointer; -webkit-tap-highlight-color:transparent;
      white-space:nowrap; transition:all .15s; font-family:inherit;
    }
    .fpill.fua { background:rgba(87,196,255,.12);  border-color:var(--ua); color:var(--ua); }
    .fpill.fub { background:rgba(192,132,252,.12); border-color:var(--ub); color:var(--ub); }
    .fpill.fla { background:rgba(255,140,87,.12);  border-color:var(--la); color:var(--la); }
    .fpill.flb { background:rgba(77,255,145,.12);  border-color:var(--lb); color:var(--lb); }

    /* Sélecteur exercice pour le graphe */
    .exo-filter-row {
      display:flex; gap:6px; overflow-x:auto; margin-bottom:14px;
      scrollbar-width:none; -webkit-overflow-scrolling:touch;
    }
    .exo-filter-row::-webkit-scrollbar { display:none; }
    .epill {
      flex-shrink:0; background: rgba(255,255,255,0.04); border: var(--glass-border);
      border-radius:20px; color:var(--muted); font-size:12px; font-weight:600;
      padding:5px 12px; cursor:pointer; -webkit-tap-highlight-color:transparent;
      white-space:nowrap; font-family:inherit;
    }
    .epill.active { background: rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.3); color:var(--text); }

    .chart-box {
      background: rgba(10,3,3,0.70);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border); border-radius:var(--r); padding:16px; margin-bottom:16px;
    }
    #chart-canvas { max-height:200px; }

    /* Badges type */
    .tbadge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; letter-spacing:.3px; }
    .tua { background:rgba(87,196,255,.15);  color:var(--ua); }
    .tub { background:rgba(192,132,252,.15); color:var(--ub); }
    .tla { background:rgba(255,140,87,.15);  color:var(--la); }
    .tlb { background:rgba(77,255,145,.15);  color:var(--lb); }

    /* Cartes historique */
    .h-card {
      background: rgba(10,3,3,0.68);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px;
    }
    .h-card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .h-exo { font-size:15px; font-weight:700; margin-top:5px; }
    .h-date { font-size:11px; color:var(--muted); text-align:right; }
    .h-sets { display:flex; flex-wrap:wrap; gap:5px; }
    .h-pill { background: rgba(255,255,255,0.06); border-radius:7px; padding:3px 9px; font-size:11px; color:var(--muted); }
    .h-pill strong { color:var(--text); }
    .h-orm { margin-top:8px; font-size:11px; color:var(--accent-dk); }
    .h-orm span { color:var(--accent); font-weight:700; }

    .empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty .ico { font-size:44px; margin-bottom:10px; }
    .empty p { font-size:13px; line-height:1.6; }

    /* TOAST */
    #toast {
      position:fixed; bottom:calc(70px + var(--safe-bot)); left:50%;
      transform:translateX(-50%) translateY(20px); background:var(--success);
      color:#0a0a0a; font-size:14px; font-weight:700; padding:10px 20px;
      border-radius:20px; opacity:0; pointer-events:none;
      transition:all .3s ease; white-space:nowrap; z-index:999;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="bg-layer"></div>
<div id="app">

  <!-- HEADER -->
  <header id="app-header">
    <div>
      <div class="header-title">Gym<span>Log</span></div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--muted)">Séances</div>
      <div style="font-size:20px;font-weight:700" id="hdr-count">0</div>
    </div>
  </header>

  <!-- SÉLECTEUR TYPE (visible uniquement hors séance active) -->
  <div id="type-bar">
    <button class="type-btn" data-t="Upper A" onclick="startSession('Upper A')">
      Upper A <span class="sub">Chest · Dos frontal</span>
    </button>
    <button class="type-btn" data-t="Upper B" onclick="startSession('Upper B')">
      Upper B <span class="sub">Dos sagittal · Incliné</span>
    </button>
    <button class="type-btn" data-t="Lower A" onclick="startSession('Lower A')">
      Lower A <span class="sub">Quad · Ischio · Mollets</span>
    </button>
    <button class="type-btn" data-t="Lower B" onclick="startSession('Lower B')">
      Lower B <span class="sub">Post. chaîne · Abdos</span>
    </button>
  </div>

  <!-- BARRE PROGRESSION SÉANCE (visible pendant séance) -->
  <div id="session-progress-bar">
    <div class="prog-top">
      <span class="prog-type" id="prog-type-label"></span>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="prog-label" id="prog-label"></span>
        <button id="btn-back-session" onclick="backToHome()">← Annuler</button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div id="prog-exo-name" style="font-size:13px;color:var(--muted);text-align:center;margin-top:4px;font-weight:500;letter-spacing:0.01em;"></div>
  </div>

  <!-- CONTENU -->
  <main id="content">

    <!-- ======================== ÉCRAN : ACCUEIL / CHOIX ======================== -->
    <section id="screen-home" class="screen on">
      <div class="empty" style="padding-top:60px">
        <div class="ico">💪</div>
        <p>Sélectionne ton type de séance<br>pour commencer.</p>
      </div>
    </section>

    <!-- ======================== ÉCRAN : SÉANCE EN COURS ======================== -->
    <section id="screen-session" class="screen">

      <!-- Carte exercice courant -->
      <div id="exo-card">
        <div class="exo-header">
          <div class="exo-name" id="exo-name">—</div>
          <div id="exo-badge"></div>
        </div>
        <div class="exo-target-sets" id="exo-target"></div>

        <!-- Dernière performance -->
        <div id="last-perf">Chargement...</div>

        <!-- Séries déjà saisies pour cet exercice -->
        <div id="done-sets"></div>

        <!-- Saisie -->
        <div class="row-2">
          <div class="form-group">
            <label>Charge (kg)</label>
            <input type="number" id="inp-weight" placeholder="80" min="0" step="0.5" inputmode="decimal" />
          </div>
          <div class="form-group">
            <label>Reps</label>
            <input type="number" id="inp-reps" placeholder="8" min="1" step="1" inputmode="numeric" />
          </div>
        </div>

        <!-- 1RM temps réel -->
        <div id="orm-inline">
          <div class="orm-lbl">1RM Epley</div>
          <div class="orm-val" id="orm-val">—</div>
        </div>

        <button class="btn btn-accent" id="btn-add-set">+ Enregistrer la série</button>
        <button class="btn btn-outline" id="btn-next-exo">Exercice suivant →</button>
        <button class="btn btn-ghost"   id="btn-skip-exo">Passer cet exercice</button>
      </div>

    </section>

    <!-- ======================== ÉCRAN : FIN DE SÉANCE ======================== -->
    <section id="screen-done" class="screen">
      <div class="done-icon">🎉</div>
      <div class="done-title" id="done-title">Séance terminée !</div>
      <div class="done-sub" id="done-sub"></div>
      <div class="done-recap" id="done-recap"></div>
      <button class="btn btn-accent" style="margin-top:24px" onclick="finishSession()">
        💾 Sauvegarder & terminer
      </button>
      <button class="btn btn-danger" onclick="cancelSession()">✕ Annuler la séance</button>
    </section>

    <!-- ======================== ÉCRAN : PROGRESSION ======================== -->
    <section id="screen-progress" class="screen">

      <p class="sec">Statistiques</p>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="st-total">0</div><div class="stat-lbl">Séances</div></div>
        <div class="stat-box"><div class="stat-val" id="st-sets">0</div><div class="stat-lbl">Séries totales</div></div>
        <div class="stat-box"><div class="stat-val" id="st-upper">0</div><div class="stat-lbl">Upper</div></div>
        <div class="stat-box"><div class="stat-val" id="st-lower">0</div><div class="stat-lbl">Lower</div></div>
      </div>

      <p class="sec">Type de séance</p>
      <div class="filter-row" id="type-filters"></div>

      <p class="sec">Exercice</p>
      <div class="exo-filter-row" id="exo-filters"></div>

      <div class="chart-box">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px" id="chart-sub"></div>
        <canvas id="chart-canvas"></canvas>
      </div>

      <p class="sec">Historique</p>
      <div id="history-list"></div>

    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-btn on" onclick="goHome(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="nav-btn" onclick="goProgress(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progression
    </button>
  </nav>
</div>
<div id="toast"></div>

<script>
/* ================================================================
   PROGRAMME : exercices par type de séance
================================================================ */
const PROGRAM = {
  'Upper A': [
    { name: 'Chess Press',    sets: 2 },
    { name: 'Rack Pull',      sets: 2 },
    { name: 'Dips',           sets: 2 },
    { name: 'Rowing',         sets: 2 },
    { name: 'Dév militaire',  sets: 3 },
    { name: 'Curl pupitre',   sets: 3 },
    { name: 'Triceps corde',  sets: 3 },
  ],
  'Upper B': [
    { name: 'Tirage pronation',          sets: 2 },
    { name: 'Dév incliné',               sets: 2 },
    { name: 'Tirage neutre',             sets: 2 },
    { name: 'Pec fly',                   sets: 2 },
    { name: 'Oiseau + Élév latérales',   sets: 3 },
    { name: 'Curl pupitre',              sets: 3 },
    { name: 'Triceps poulie',            sets: 3 },
  ],
  'Lower A': [
    { name: 'Mollets',               sets: 3 },
    { name: 'Leg curl assis',        sets: 2 },
    { name: 'Presse cuisse pied bas',sets: 2 },
    { name: 'Jefferson curl',        sets: 2 },
    { name: 'Leg extension',         sets: 2 },
  ],
  'Lower B': [
    { name: 'Abdos',         sets: 3 },
    { name: 'Deadlift',      sets: 2 },
    { name: 'Leg extension', sets: 2 },
    { name: 'Hip thrust',    sets: 2 },
    { name: 'Sissy squat',   sets: 2 },
  ],
};

const TYPE_CFG = {
  'Upper A': { color:'#57c4ff', slug:'ua', cls:'tua', fcls:'fua' },
  'Upper B': { color:'#c084fc', slug:'ub', cls:'tub', fcls:'fub' },
  'Lower A': { color:'#ff8c57', slug:'la', cls:'tla', fcls:'fla' },
  'Lower B': { color:'#4dff91', slug:'lb', cls:'tlb', fcls:'flb' },
};

/* ================================================================
   PERSISTANCE
================================================================ */
const KEY = 'gymlog_v4';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

/* ================================================================
   ÉTAT GLOBAL
================================================================ */
let sessions    = load();
let activeType  = null;   // type de séance en cours
let exoIndex    = 0;      // index dans PROGRAM[activeType]
let currentSets = {};     // { 'Chess Press': [{weight,reps,orm}, ...], ... }
let skipped     = [];     // exercices passés
let progressChart = null;
let filterType  = null;
let filterExo   = null;

/* ================================================================
   UTILITAIRES
================================================================ */
function calc1RM(w, r) {
  if (!w || !r || r < 1) return null;
  return r === 1 ? w : w * (1 + r / 30);
}

function fmt1RM(v) { return v ? v.toFixed(1) + ' kg' : '—'; }

function typeColor(t) { return TYPE_CFG[t] ? TYPE_CFG[t].color : '#7a7a7a'; }
function typeBadge(t) {
  if (!t || !TYPE_CFG[t]) return '';
  const c = TYPE_CFG[t];
  return `<span class="tbadge ${c.cls}">${t}</span>`;
}

function lastPerf(exoName, sessionType) {
  // Cherche la dernière séance du même type contenant cet exercice
  const prev = sessions
    .filter(s => s.sessionType === sessionType && s.exercise === exoName)
    .sort((a,b) => new Date(b.date) - new Date(a.date))[0];
  if (!prev) return '<span style="color:var(--muted)">Aucune donnée précédente</span>';
  const date = new Date(prev.date).toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
  const setsStr = prev.sets.map(s => `${s.weight}kg×${s.reps}`).join('  ·  ');
  return `<strong>Dernière fois (${date}) :</strong> ${setsStr}
    ${prev.maxOrm ? `<br><span style="color:var(--accent-dk)">1RM max : ${prev.maxOrm.toFixed(1)} kg</span>` : ''}`;
}

/* ================================================================
   NAVIGATION PRINCIPALE
================================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function backToHome() {
  // Si des séries ont déjà été saisies, demander confirmation
  const hasSets = Object.values(currentSets).some(s => s.length > 0);
  if (hasSets) {
    if (!confirm('Des séries ont été saisies. Annuler la séance ?')) return;
  }
  resetSession();
  showScreen('screen-home');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.querySelector('.nav-btn').classList.add('on');
}

function goHome(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // Si une séance est en cours, revenir à l'écran de saisie
  if (activeType) {
    showScreen('screen-session');
  } else {
    showScreen('screen-home');
  }
}

function goProgress(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderProgress();
  showScreen('screen-progress');
}

/* ================================================================
   DÉMARRER UNE SÉANCE
================================================================ */
function startSession(type) {
  activeType  = type;
  exoIndex    = 0;
  currentSets = {};
  skipped     = [];

  // Masquer type-bar, afficher barre de progression
  document.getElementById('type-bar').style.display = 'none';
  document.getElementById('session-progress-bar').style.display = 'flex';

  // Nav : forcer "Accueil" actif
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.querySelector('.nav-btn').classList.add('on');

  showScreen('screen-session');
  renderExo();
}

/* ================================================================
   AFFICHER L'EXERCICE COURANT
================================================================ */
function renderExo() {
  const exos = PROGRAM[activeType];
  if (exoIndex >= exos.length) { showSummary(); return; }

  const exo = exos[exoIndex];
  const cfg = TYPE_CFG[activeType];

  // Barre de progression
  document.getElementById('prog-type-label').textContent = activeType;
  document.getElementById('prog-type-label').style.color = cfg.color;
  document.getElementById('prog-label').textContent =
    `${exoIndex + 1} / ${exos.length}`;
  document.getElementById('prog-fill').style.width =
    `${Math.round((exoIndex / exos.length) * 100)}%`;
  document.getElementById('prog-exo-name').textContent = exo.name;

  // Carte
  document.getElementById('exo-name').textContent   = exo.name;
  document.getElementById('exo-badge').innerHTML    = typeBadge(activeType);
  document.getElementById('exo-target').textContent =
    `${exo.sets} série${exo.sets > 1 ? 's' : ''} prévue${exo.sets > 1 ? 's' : ''}`;
  document.getElementById('last-perf').innerHTML    = lastPerf(exo.name, activeType);

  // Réinitialiser saisie
  document.getElementById('inp-weight').value = '';
  document.getElementById('inp-reps').value   = '';
  document.getElementById('orm-val').textContent = '—';

  // Bouton suivant : libellé adapté
  const isLast = exoIndex === exos.length - 1;
  document.getElementById('btn-next-exo').textContent =
    isLast ? 'Terminer la séance ✓' : 'Exercice suivant →';

  renderDoneSets();
}

/* ================================================================
   AFFICHER LES SÉRIES SAISIES POUR L'EXO COURANT
================================================================ */
function renderDoneSets() {
  const exo  = PROGRAM[activeType][exoIndex];
  const sets = currentSets[exo.name] || [];
  const container = document.getElementById('done-sets');

  if (sets.length === 0) { container.innerHTML = ''; return; }

  container.innerHTML = sets.map((s, i) => `
    <span class="set-chip">
      <span>${s.weight}kg × ${s.reps}</span>
      <span class="orm-chip">≈${fmt1RM(s.orm)}</span>
      <span class="del-chip" onclick="deleteSet(${i})">✕</span>
    </span>
  `).join('');
}

function deleteSet(i) {
  const name = PROGRAM[activeType][exoIndex].name;
  currentSets[name].splice(i, 1);
  renderDoneSets();
}

/* ================================================================
   ENREGISTRER UNE SÉRIE
================================================================ */
document.getElementById('btn-add-set').addEventListener('click', () => {
  const w = parseFloat(document.getElementById('inp-weight').value);
  const r = parseInt(document.getElementById('inp-reps').value);
  if (!w || w <= 0) { showToast('⚠️ Entre une charge', false); return; }
  if (!r || r < 1)  { showToast('⚠️ Entre les reps', false); return; }

  const orm  = calc1RM(w, r);
  const name = PROGRAM[activeType][exoIndex].name;
  if (!currentSets[name]) currentSets[name] = [];
  currentSets[name].push({ weight: w, reps: r, orm });

  document.getElementById('inp-weight').value = '';
  document.getElementById('inp-reps').value   = '';
  document.getElementById('orm-val').textContent = '—';
  document.getElementById('inp-weight').focus();

  renderDoneSets();
  showToast('Série ajoutée ✓', true);

  // ── Auto-avance si le nombre de séries prévues est atteint ──
  const exo  = PROGRAM[activeType][exoIndex];
  const done = (currentSets[exo.name] || []).length;
  if (done >= exo.sets) {
    const isLast = exoIndex === PROGRAM[activeType].length - 1;
    if (isLast) {
      // Dernier exercice : on montre le résumé après un court délai
      setTimeout(() => showSummary(), 800);
    } else {
      showToast(`✅ ${exo.sets} série${exo.sets > 1 ? 's' : ''} atteinte${exo.sets > 1 ? 's' : ''} — Exercice suivant !`, true);
      setTimeout(() => { exoIndex++; renderExo(); }, 1200);
    }
  }
});

/* ================================================================
   EXERCICE SUIVANT
================================================================ */
document.getElementById('btn-next-exo').addEventListener('click', () => {
  const name = PROGRAM[activeType][exoIndex].name;
  // Si aucune série saisie, confirmation
  if (!currentSets[name] || currentSets[name].length === 0) {
    if (!confirm(`Aucune série pour "${name}". Continuer quand même ?`)) return;
    skipped.push(name);
  }
  exoIndex++;
  renderExo();
});

/* ================================================================
   PASSER UN EXERCICE
================================================================ */
document.getElementById('btn-skip-exo').addEventListener('click', () => {
  const name = PROGRAM[activeType][exoIndex].name;
  if (!confirm(`Passer "${name}" ?`)) return;
  skipped.push(name);
  exoIndex++;
  renderExo();
});

/* ================================================================
   RÉSUMÉ FIN DE SÉANCE
================================================================ */
function showSummary() {
  // Barre de progression à 100%
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent =
    `${PROGRAM[activeType].length} / ${PROGRAM[activeType].length}`;

  document.getElementById('done-title').textContent = `${activeType} terminée !`;
  document.getElementById('done-sub').textContent =
    `${Object.keys(currentSets).length} exercice(s) · ${
      Object.values(currentSets).reduce((a, s) => a + s.length, 0)
    } séries`;

  // Récap
  const rows = Object.entries(currentSets).map(([exo, sets]) => {
    const maxOrm = Math.max(...sets.map(s => s.orm || 0));
    const detail = sets.map(s => `${s.weight}kg×${s.reps}`).join(' · ');
    return `
      <div class="recap-row">
        <div>
          <div class="recap-exo">${exo}</div>
          <div class="recap-detail">${detail}</div>
        </div>
        <div class="recap-orm">${maxOrm > 0 ? fmt1RM(maxOrm) : '—'}</div>
      </div>`;
  }).join('');

  const skippedHtml = skipped.length
    ? `<div style="margin-top:12px;font-size:12px;color:var(--muted)">
         Passés : ${skipped.join(', ')}
       </div>` : '';

  document.getElementById('done-recap').innerHTML = rows + skippedHtml;
  showScreen('screen-done');
}

/* ================================================================
   SAUVEGARDER LA SÉANCE
================================================================ */
function finishSession() {
  const now = new Date().toISOString();
  Object.entries(currentSets).forEach(([exercise, sets]) => {
    if (sets.length === 0) return;
    const maxOrm = Math.max(...sets.map(s => s.orm || 0));
    sessions.push({
      id: Date.now() + Math.random(),
      date: now,
      sessionType: activeType,
      exercise,
      sets,
      maxOrm: maxOrm > 0 ? maxOrm : null,
    });
  });
  save(sessions);
  updateHdrCount();
  resetSession();
  showToast(`✓ ${activeType} sauvegardée !`, true);
  showScreen('screen-home');
}

function cancelSession() {
  if (!confirm('Annuler et perdre toutes les séries saisies ?')) return;
  resetSession();
  showScreen('screen-home');
}

function resetSession() {
  activeType  = null;
  exoIndex    = 0;
  currentSets = {};
  skipped     = [];
  document.getElementById('type-bar').style.display = 'flex';
  document.getElementById('session-progress-bar').style.display = 'none';
  document.getElementById('prog-fill').style.width = '0%';
  // Reset boutons type-bar
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('on'));
}

/* ================================================================
   1RM TEMPS RÉEL
================================================================ */
document.getElementById('inp-weight').addEventListener('input', updateOrm);
document.getElementById('inp-reps').addEventListener('input', updateOrm);
function updateOrm() {
  const w = parseFloat(document.getElementById('inp-weight').value);
  const r = parseInt(document.getElementById('inp-reps').value);
  const v = calc1RM(w, r);
  document.getElementById('orm-val').textContent = v ? v.toFixed(1) + ' kg' : '—';
}

/* ================================================================
   HEADER COUNT
================================================================ */
function updateHdrCount() {
  document.getElementById('hdr-count').textContent = sessions.length;
}

/* ================================================================
   PROGRESSION
================================================================ */
function renderProgress() {
  // Stats
  const totalSets = sessions.reduce((a, s) => a + s.sets.length, 0);
  const upper = sessions.filter(s => s.sessionType?.startsWith('Upper')).length;
  const lower = sessions.filter(s => s.sessionType?.startsWith('Lower')).length;
  document.getElementById('st-total').textContent = sessions.length;
  document.getElementById('st-sets').textContent  = totalSets;
  document.getElementById('st-upper').textContent = upper;
  document.getElementById('st-lower').textContent = lower;

  // Filtres type
  const presentTypes = Object.keys(TYPE_CFG).filter(t => sessions.some(s => s.sessionType === t));
  if (!filterType || !presentTypes.includes(filterType)) filterType = presentTypes[0] || null;

  const tf = document.getElementById('type-filters');
  if (presentTypes.length === 0) {
    tf.innerHTML = '<span style="color:var(--muted);font-size:13px">Aucune séance</span>';
  } else {
    tf.innerHTML = presentTypes.map(t => {
      const c = TYPE_CFG[t];
      return `<button class="fpill ${t === filterType ? c.fcls : ''}"
        onclick="setFilterType('${t}')">${t}</button>`;
    }).join('');
  }

  renderExoFilters();
  renderChart();
  renderHistory();
}

function setFilterType(t) {
  filterType = t;
  filterExo  = null;
  renderExoFilters();
  renderChart();
  renderHistory();
  // Refresh pills
  const presentTypes = Object.keys(TYPE_CFG).filter(tp => sessions.some(s => s.sessionType === tp));
  document.getElementById('type-filters').innerHTML = presentTypes.map(tp => {
    const c = TYPE_CFG[tp];
    return `<button class="fpill ${tp === filterType ? c.fcls : ''}"
      onclick="setFilterType('${tp}')">${tp}</button>`;
  }).join('');
}

function renderExoFilters() {
  const row = document.getElementById('exo-filters');
  if (!filterType) { row.innerHTML = ''; return; }
  // Exercices du programme pour ce type
  const exos = PROGRAM[filterType] ? PROGRAM[filterType].map(e => e.name) : [];
  // Garder seulement ceux qui ont des données
  const withData = exos.filter(e => sessions.some(s => s.sessionType === filterType && s.exercise === e));
  if (withData.length === 0) { row.innerHTML = '<span style="color:var(--muted);font-size:12px">Aucune donnée</span>'; return; }
  if (!filterExo || !withData.includes(filterExo)) filterExo = withData[0];
  row.innerHTML = withData.map(e =>
    `<button class="epill ${e === filterExo ? 'active' : ''}"
      onclick="setFilterExo('${e.replace(/'/g,"\\'")}')">
      ${e}
    </button>`
  ).join('');
}

function setFilterExo(e) {
  filterExo = e;
  renderExoFilters();
  renderChart();
}

/* ================================================================
   GRAPHIQUE
================================================================ */
function renderChart() {
  const canvas = document.getElementById('chart-canvas');
  const ctx    = canvas.getContext('2d');
  if (progressChart) { progressChart.destroy(); progressChart = null; }
  document.getElementById('chart-sub').textContent =
    filterExo ? `${filterType} — ${filterExo}` : '';

  if (!filterType || !filterExo) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }

  const color = typeColor(filterType);
  const data  = sessions
    .filter(s => s.sessionType === filterType && s.exercise === filterExo)
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  if (data.length === 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#7a7a7a'; ctx.font = '13px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Aucune donnée', canvas.width / 2, 80);
    return;
  }

  const labels  = data.map(s => new Date(s.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}));
  const ormData = data.map(s => s.maxOrm ? parseFloat(s.maxOrm.toFixed(1)) : null);
  const wData   = data.map(s => parseFloat(Math.max(...s.sets.map(x => x.weight)).toFixed(1)));

  progressChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '1RM estimé',
          data: ormData,
          borderColor: color,
          backgroundColor: color + '18',
          borderWidth: 2.5,
          pointBackgroundColor: color,
          pointRadius: 5,
          tension: 0.35,
          fill: true,
          spanGaps: true,
        },
        {
          label: 'Charge max',
          data: wData,
          borderColor: '#7a7a7a',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 3],
          pointBackgroundColor: '#7a7a7a',
          pointRadius: 4,
          tension: 0.35,
          spanGaps: true,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color:'#7a7a7a', font:{ size:10 }, boxWidth:16, padding:10 } },
        tooltip: {
          backgroundColor:'#1e1e1e', borderColor:'#2a2a2a', borderWidth:1,
          titleColor:'#f0f0f0', bodyColor:'#7a7a7a', padding:10,
        }
      },
      scales: {
        x: { grid:{ color:'#1e1e1e' }, ticks:{ color:'#7a7a7a', font:{ size:10 } } },
        y: { grid:{ color:'#1e1e1e' }, ticks:{ color:'#7a7a7a', font:{ size:10 }, callback: v => v+' kg' } }
      }
    }
  });
}

/* ================================================================
   HISTORIQUE
================================================================ */
function renderHistory() {
  const container = document.getElementById('history-list');
  const filtered  = sessions
    .filter(s => !filterType || s.sessionType === filterType)
    .filter(s => !filterExo  || s.exercise === filterExo)
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="ico">📊</div>
      <p>Aucune séance ${filterType || ''} enregistrée.</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(s => {
    const d    = new Date(s.date);
    const dStr = d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'long'});
    const tStr = d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const sHtml = s.sets.map(x =>
      `<div class="h-pill"><strong>${x.weight}kg</strong> × ${x.reps}</div>`
    ).join('');
    const ormHtml = s.maxOrm
      ? `<div class="h-orm">1RM max : <span>${s.maxOrm.toFixed(1)} kg</span></div>` : '';
    return `
      <div class="h-card">
        <div class="h-card-head">
          <div>${typeBadge(s.sessionType)}<div class="h-exo">${s.exercise}</div></div>
          <div class="h-date">${dStr}<br>${tStr}</div>
        </div>
        <div class="h-sets">${sHtml}</div>
        ${ormHtml}
      </div>`;
  }).join('');
}

/* ================================================================
   TOAST
================================================================ */
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? 'var(--success)' : '#ff9500';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ================================================================
   INIT
================================================================ */
function updateHeaderDate() {
  const s = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('header-date').textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

updateHeaderDate();
updateHdrCount();
</script>

<!-- ================================================================
     SERVICE WORKER INLINE — PWA OFFLINE
     Le SW est généré dynamiquement en Blob, pas besoin de second fichier.
     Une fois chargé en Wi-Fi, l'app fonctionne 100% hors ligne.
================================================================ -->
<script>
if ('serviceWorker' in navigator) {
  // Contenu du Service Worker en chaîne de caractères
  const swCode = `
    const CACHE = 'gymlog-v1';

    // À l'installation : mise en cache de la page elle-même
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache =>
          cache.addAll([self.location.origin + self.location.pathname])
        )
      );
      self.skipWaiting();
    });

    // Activation : nettoyage des anciens caches
    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    // Fetch : cache-first — si en cache on sert depuis le cache,
    // sinon on essaie le réseau et on met en cache au passage
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(response => {
            if (!response || response.status !== 200 || response.type === 'opaque') {
              return response;
            }
            const clone = response.clone();
            caches.open(CACHE).then(cache => cache.put(e.request, clone));
            return response;
          }).catch(() => caches.match('/'));
        })
      );
    });
  `;

  // Créer un Blob URL pour le SW (évite d'avoir un fichier sw.js séparé)
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {
    console.log('[GymLog] Service Worker enregistré :', reg.scope);
  }).catch(err => {
    console.warn('[GymLog] SW non supporté dans ce contexte :', err);
  });
}
</script>
